<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Citum</title>
  
  <link rel="stylesheet" href="/styles/landing.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      position: relative;
    }
    .auth-card {
      max-width: 440px;
      width: 100%;
      background: rgba(33, 26, 75, 0.75);
      backdrop-filter: blur(18px);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-soft);
      padding: var(--space-12) var(--space-8) var(--space-8) var(--space-8);
      box-shadow: var(--shadow-hover);
      text-align: center;
      position: relative;
    }
    .auth-logo {
      margin-bottom: var(--space-8);
      justify-content: center;
    }
    .auth-title {
      font-size: var(--text-2xl);
      font-weight: 800;
      margin-bottom: var(--space-2);
      letter-spacing: -0.02em;
    }
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-8);
    }
    .form-group {
      text-align: left;
      margin-bottom: var(--space-6);
    }
    .form-label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }
    .form-input {
      width: 100%;
      height: 52px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      padding-inline: var(--space-4);
      color: var(--text-primary);
      font-size: var(--text-base);
      outline: none;
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
    }
    .form-input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(139, 92, 255, 0.15);
    }
    .auth-btn {
      width: 100%;
      margin-top: var(--space-4);
      margin-bottom: var(--space-6);
    }
    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin-top: var(--space-2);
      margin-bottom: var(--space-6);
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-soft);
    }
    .auth-divider:not(:empty)::before {
      margin-right: var(--space-4);
    }
    .auth-divider:not(:empty)::after {
      margin-left: var(--space-4);
    }
    .auth-google-btn {
      width: 100%;
      margin-bottom: var(--space-6);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-soft);
      color: var(--text-primary);
      transition: background-color var(--transition-base), border-color var(--transition-base), transform var(--transition-base);
    }
    .auth-google-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(139, 92, 255, 0.2);
      transform: translateY(-2px);
    }
    .auth-footer-link {
      font-size: var(--text-sm);
      color: var(--text-muted);
    }
    .auth-footer-link a {
      color: var(--accent-neon);
      font-weight: 600;
    }
    .auth-footer-link a:hover {
      color: var(--text-primary);
    }
    .back-to-home {
      position: absolute;
      top: var(--space-8);
      left: var(--space-8);
      font-size: var(--text-sm);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .back-to-home:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body class="landing-body">

  <div class="auth-container">
    <a href="/index.html" class="back-to-home" id="btn-back-home">
      <i data-lucide="arrow-left" size="16"></i>
      Volver al inicio
    </a>
    
    <div class="auth-card" id="login-card">
      <a href="#" class="logo auth-logo" id="auth-logo-link">
        <span class="logo-icon"></span>
        Citum
      </a>
      
      <h1 class="auth-title" id="auth-title-text">Bienvenido de nuevo</h1>
      <p class="auth-subtitle" id="auth-subtitle-text">Ingresa tus credenciales para acceder a tu panel.</p>
      
      <form id="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="Mín. 8 caracteres" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg auth-btn" id="btn-auth-submit">
          Ingresar al Panel
        </button>
      </form>

      <div class="auth-divider">
        <span>O continuar con</span>
      </div>

      <button type="button" class="btn btn-secondary btn-lg auth-google-btn" id="btn-google-auth">
        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" style="margin-right: 10px;">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      
      <p class="auth-footer-link" id="auth-switch-link">
        ¿No tienes una cuenta? <a href="#" id="link-auth-toggle">Regístrate gratis</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { auth } from '/src/core/auth.js';

    // Inicializar icons
    lucide.createIcons();

    // Verificar si ya hay sesión activa → redirigir al panel directamente
    auth.getSession().then(({ session }) => {
      if (session) {
        window.location.replace('/panel.html');
      }
    });

    // --- Toggle Login / Registro ---
    const toggleLink   = document.getElementById('link-auth-toggle');
    const titleText    = document.getElementById('auth-title-text');
    const subtitleText = document.getElementById('auth-subtitle-text');
    const submitBtn    = document.getElementById('btn-auth-submit');
    const switchLink   = document.getElementById('auth-switch-link');
    let isRegistering  = false;

    function bindToggle() {
      const el = document.getElementById('link-auth-toggle');
      if (!el) return;
      el.addEventListener('click', (e) => {
        e.preventDefault();
        isRegistering = !isRegistering;
        if (isRegistering) {
          titleText.textContent    = 'Crea tu cuenta gratis';
          subtitleText.textContent = 'Comienza a gestionar tus citas de forma inteligente hoy.';
          submitBtn.textContent    = 'Crear Cuenta';
          switchLink.innerHTML     = '¿Ya tienes una cuenta? <a href="#" id="link-auth-toggle">Inicia sesión</a>';
        } else {
          titleText.textContent    = 'Bienvenido de nuevo';
          subtitleText.textContent = 'Ingresa tus credenciales para acceder a tu panel.';
          submitBtn.textContent    = 'Ingresar al Panel';
          switchLink.innerHTML     = '¿No tienes una cuenta? <a href="#" id="link-auth-toggle">Regístrate gratis</a>';
        }
        bindToggle();
      });
    }
    bindToggle();

    // --- Manejo del formulario ---
    const form       = document.getElementById('auth-form');
    const emailInput = document.getElementById('email');
    const passInput  = document.getElementById('password');
    const errorBox   = (() => {
      const el = document.createElement('p');
      el.style.cssText = 'color:#ff5a7a; font-size:13px; margin-top:-8px; margin-bottom: 8px; text-align: center; display: none;';
      form.insertBefore(el, submitBtn);
      return el;
    })();

    function showError(msg, isSuccess = false) {
      errorBox.textContent = msg;
      errorBox.style.color = isSuccess ? '#10b981' : '#ff5a7a';
      errorBox.style.display = 'block';
    }
    function hideError() {
      errorBox.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = emailInput.value.trim();
      const password = passInput.value;

      submitBtn.disabled    = true;
      submitBtn.textContent = isRegistering ? 'Creando cuenta...' : 'Ingresando...';

      try {
        let result;
        if (isRegistering) {
          result = await auth.register(email, password, email.split('@')[0]);
          if (result.error) throw result.error;
          // Informar al usuario que verifique email
          showError('¡Cuenta creada! Revisa tu correo para confirmarla.', true);
          submitBtn.textContent = 'Crear Cuenta';
          submitBtn.disabled = false;
          return;
        } else {
          result = await auth.login(email, password);
          if (result.error) throw result.error;
          window.location.replace('/panel.html');
          return;
        }
      } catch (err) {
        const msg = err?.message || 'Error al autenticar. Intenta de nuevo.';
        if (msg.toLowerCase().includes('invalid login')) {
          showError('Email o contraseña incorrectos.');
        } else if (msg.toLowerCase().includes('email not confirmed')) {
          showError('Debes confirmar tu correo antes de ingresar.');
        } else {
          showError(msg);
        }
        submitBtn.disabled    = false;
        submitBtn.textContent = isRegistering ? 'Crear Cuenta' : 'Ingresar al Panel';
      }
    });

    // --- Google Auth ---
    const googleBtn = document.getElementById('btn-google-auth');
    if (googleBtn) {
      googleBtn.addEventListener('click', async () => {
        try {
          hideError();
          googleBtn.disabled = true;
          googleBtn.textContent = 'Conectando con Google...';
          const { error } = await auth.loginWithGoogle();
          if (error) throw error;
        } catch (err) {
          showError(err?.message || 'Error al conectar con Google.');
          googleBtn.disabled = false;
          googleBtn.innerHTML = `
            <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" style="margin-right: 10px;">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            Google
          `;
        }
      });
    }
  </script>
</body>
</html>
